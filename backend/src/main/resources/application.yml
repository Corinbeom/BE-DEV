spring:
  application:
    name: devweb
  config:
    import: optional:file:.env.properties
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname,account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  datasource:
    url: jdbc:h2:mem:devweb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  h2:
    console:
      enabled: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

logging:
  level:
    com.devweb: info
    com.devweb.infra.ai: debug
    org.hibernate.SQL: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,prometheus
  endpoint:
    health:
      show-details: always

devweb:
  jwt:
    secret: ${JWT_SECRET:devweb-default-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiry-hours: 24

  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  cookie-domain: ${COOKIE_DOMAIN:}

  # AI 공급자 선택: gemini(기본값) 또는 groq
  ai:
    provider: ${AI_PROVIDER:gemini}

  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash
    base-url: https://generativelanguage.googleapis.com
    request-timeout-seconds: 90
    max-output-tokens: 8192

  groq:
    api-key: ${GROQ_API_KEY:}
    model: llama-3.3-70b-versatile
    base-url: https://api.groq.com
    request-timeout-seconds: 60
    max-output-tokens: 4096

  resend:
    api-key: ${RESEND_API_KEY:}
    from: ${RESEND_FROM:onboarding@resend.dev}

  cron:
    secret: ${DEVWEB_CRON_SECRET:}


